name: Publish npm package

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - run: npm run release:check
      - name: Publish to npm
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version is already on npm, skipping publish."
          else
            npm publish
          fi
      - name: Create GitHub release
        run: |
          node scripts/extract-changelog-section.mjs > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
